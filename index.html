<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lotus Bodhicitta System</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #05070a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff; user-select: none; -webkit-user-select: none;
        }
        #canvas-container { width: 100vw; height: 100vh; display: block; }

        /* Floating Action Button */
        #action-container { position: absolute; top: 15px; left: 15px; z-index: 30; pointer-events: auto; }
        #start-btn {
            background: #ffd700; color: #05070a; border: 1px solid rgba(255, 215, 0, 0.6);
            padding: 12px 24px; border-radius: 12px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1.5px; font-size: 12px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.35);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        #start-btn:hover { background: #ffe240; box-shadow: 0 0 30px rgba(255, 215, 0, 0.6); transform: translateY(-2px); }
        #start-btn:active { transform: translateY(1px); }

        /* Collapsible UI Menu Control Panel */
        #ui-container {
            position: absolute; top: 75px; left: 15px;
            background: rgba(10, 15, 25, 0.85); padding: 14px 18px; border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.08);
            width: 290px; pointer-events: auto;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); z-index: 10;
        }
        #ui-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        h1 { font-size: 14px; margin: 0; color: #ffd700; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        #ui-toggle-btn { background: none; border: none; color: #ffd700; font-size: 12px; cursor: pointer; padding: 4px; transition: transform 0.3s ease; }
        #ui-content { margin-top: 12px; transition: max-height 0.3s ease, opacity 0.3s ease; max-height: 520px; opacity: 1; }
        #ui-container.collapsed { width: 220px; }
        #ui-container.collapsed #ui-toggle-btn { transform: rotate(-90deg); }
        #ui-container.collapsed #ui-content { max-height: 0; opacity: 0; margin-top: 0; overflow: hidden; pointer-events: none; }

        p { font-size: 11px; color: #aaa; margin: 0 0 12px 0; line-height: 1.4; }
        .control-group { margin-bottom: 10px; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        select, input[type="range"] {
            width: 100%; background: #141a24; border: 1px solid #253043; color: #fff;
            padding: 6px; border-radius: 6px; outline: none; box-sizing: border-box; font-size: 11px;
        }

        .checkbox-container { display: flex; align-items: center; gap: 8px; margin-top: 10px; cursor: pointer; }
        .checkbox-container input[type="checkbox"] { width: 16px; height: 16px; accent-color: #ffd700; cursor: pointer; }
        .checkbox-container span { font-size: 11px; color: #ddd; text-transform: uppercase; letter-spacing: 0.5px; }

        details { background: rgba(20, 26, 36, 0.5); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 8px; padding: 8px 10px; margin-top: 8px; }
        summary { font-size: 10px; color: #ffd700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px; outline: none; user-select: none; }

        /* Interactive Click Popup Card */
        #popup-card {
            position: absolute; bottom: 25px; left: 50%;
            transform: translateX(-50%) translateY(150px);
            background: rgba(10, 15, 25, 0.92); border: 1px solid rgba(255, 215, 0, 0.25);
            border-radius: 16px; padding: 16px 20px; width: 85%; max-width: 340px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
            opacity: 0; pointer-events: none; z-index: 20;
        }
        #popup-card.active { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }
        #popup-close { position: absolute; top: 10px; right: 12px; background: none; border: none; color: #888; font-size: 18px; cursor: pointer; padding: 4px; }
        #popup-title {
            color: #ffd700; margin: 0 0 10px 0; font-size: 16px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 6px;
        }
        .popup-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12px; }
        .popup-label { color: #77849a; }
        .popup-val { font-weight: 500; color: #fff; }

        .popup-mantra-section { margin-top: 12px; border-top: 1px solid rgba(255, 255, 255, 0.08); padding-top: 10px; }
        .popup-mantra-val {
            font-family: Georgia, Cambria, "Times New Roman", Times, serif; font-style: italic;
            font-size: 12px; line-height: 1.55; color: #ffd700;
            background: rgba(255, 215, 0, 0.04); border-left: 2px solid #ffd700;
            padding: 10px 14px; border-radius: 0 8px 8px 0; letter-spacing: 0.3px; white-space: pre-line;
        }

        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #05070a; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; transition: opacity 0.6s ease;
        }
        .spinner { width: 40px; height: 40px; border: 2px solid rgba(255, 215, 0, 0.1); border-top-color: #ffd700; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-text { margin-top: 16px; color: #ffd700; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; }

        @media (max-width: 600px) {
            #action-container { width: calc(100% - 30px); left: 10px; top: 10px; }
            #start-btn { width: 100%; text-align: center; }
            #ui-container { width: calc(100% - 30px); max-width: none; top: 75px; left: 10px; }
            #ui-container.collapsed { width: calc(100% - 30px); }
        }
    </style>

                <div style="margin-top: 8px;">
                    <input type="range" id="glow-intensity" min="0" max="3" step="0.1" value="1.5">
                </div>
            </details>
        </div>
    </div>

        // Helper function for dynamic color assignment of B nodes
        // =========================================================================
        function getBNodeBaseColor(id) {
            const num = parseInt(id.substring(1));
            if (num >= 1 && num <= 6) {
                return new THREE.Color(0xaa00ff); // Purple
            } else if (num >= 7 && num <= 21) {
                return new THREE.Color(0xffffff); // White
            } else if (num >= 22 && num <= 25) {
                return new THREE.Color(0x00aaff); // Blue
            } else if (num >= 26 && num <= 31) {
                return new THREE.Color(0x00ff66); // Green
            } else if (num >= 32 && num <= 34) {
                return new THREE.Color(0xff00ff); // Magenta
            }
            return new THREE.Color(0xffffff);
        }

        // Spiral path (Three.js coords; y = up). Clockwise, advancing outward & upward.
        function getSpiralPosition(t) {
            const theta = -Math.PI / 2 - t * Math.PI / 2;
            const r = 2.0 + t * 0.05;
            const y = -0.4 + t * 0.1;
            return new THREE.Vector3(r * Math.cos(theta), y, r * Math.sin(theta));
        }

        // Generate 40 Siddham LA nodes (A1–A40). excelPos stored as [x, y, z] (natural mapping).
        for (let i = 0; i < 40; i++) {
            const pos = getSpiralPosition(i);
            baseSphereData.push({
                id: `A${i + 1}`,
                name: `Siddham LA Node #${i + 1}`,
                excelPos: [pos.x, pos.y, pos.z],
                chakra: "N/A",
                image: "06_LA_Gold.png",

        }

        // =========================================================================

        const popupCoords        = document.getElementById('popup-coords');
        const popupMantra        = document.getElementById('popup-mantra');

        // =========================================================================
        // 3. Scene, Camera, Renderer
        // =========================================================================
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x05070a, 0.03);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        
        // Base initial view coordinates
        const initialCameraPos = new THREE.Vector3(4.53, 3.5, -2.11);
        // Rotate initial view vector 40 degrees to the right (counter-clockwise around Y-axis)
        initialCameraPos.applyAxisAngle(new THREE.Vector3(0, 1, 0), 40 * Math.PI / 180);
        camera.position.copy(initialCameraPos);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 30;
        controls.minDistance = 2;

        // =========================================================================
        // 4. Environment & Lights
        // =========================================================================
        function createStudioEnvMap() {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#101622');
            grad.addColorStop(0.5, '#05070a');
            grad.addColorStop(1, '#020305');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(40, 20, 30, 40);
            ctx.fillRect(180, 40, 40, 30);
            const texture = new THREE.CanvasTexture(canvas);
            texture.mapping = THREE.EquirectangularReflectionMapping;
            return texture;
        }
        scene.environment = createStudioEnvMap();

        scene.add(new THREE.AmbientLight(0xffffff, 0.15));

        const keyLight = new THREE.DirectionalLight(0xfff5e6, 2.0);
        keyLight.position.set(5, 8, 5); keyLight.castShadow = true; scene.add(keyLight);

        // =========================================================================

        });

        });

        // Cached geometries (reused across all nodes)

        const loader = new THREE.GLTFLoader();

        loader.load(MODEL_URL,
            (gltf) => {
                const buddhaMesh = gltf.scene;

                legs.rotation.x = Math.PI / 2; legs.position.y = -0.25; fallbackGroup.add(legs);
                fallbackGroup.position.set(0.0, -0.5, -0.18);
                fallbackGroup.rotation.y = Math.PI / 2;
                buddhaGroup.add(fallbackGroup);
                loadingOverlay.style.opacity = 0;
                setTimeout(() => { loadingOverlay.style.display = 'none'; }, 600);

        // =========================================================================
        // 7. Spheres & character glyphs  (natural mapping: x,y,z = excelPos[0,1,2])
        // =========================================================================
        const spheresGroup = new THREE.Group();
        scene.add(spheresGroup);

        const clickableSpheres = [];
        const textureLoader = new THREE.TextureLoader();

        function createFallbackGlyphTexture(char, phonetic) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 512, 512);
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 25;
            ctx.fillStyle = '#ffffff'; ctx.font = 'bold 240px sans-serif';
            ctx.fillText(char, 256, 220);
            ctx.shadowBlur = 8; ctx.fillStyle = '#ffb90f'; ctx.font = '600 48px sans-serif';
            ctx.fillText(phonetic.toUpperCase(), 256, 400);
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        baseSphereData.forEach((data) => {
            const pos = new THREE.Vector3(data.excelPos[0], data.excelPos[1], data.excelPos[2]);
            const isGroupB = data.id.startsWith('B');

            const sphereGeo = isGroupB ? sphereGeoB : sphereGeoA;
            let mat;
            if (isGroupB) {
                mat = new THREE.MeshPhysicalMaterial({
                    color: getBNodeBaseColor(data.id),
                    roughness: 0.1, metalness: 0.1, transmission: 0.9,
                    ior: 1.52, thickness: 0.2, transparent: true, opacity: 1.0,
                    side: THREE.DoubleSide, depthWrite: false
                });
            } else {
                mat = clearBubbleGlass.clone();
            }

            const sphere = new THREE.Mesh(sphereGeo, mat);
            sphere.position.copy(pos);
            sphere.visible = false;
            sphere.userData = { ...data, glow: 0.0, hasBeenCalled: false };
            spheresGroup.add(sphere);
            clickableSpheres.push(sphere);
            data.sphereMesh = sphere;

            const planeGeo = isGroupB ? planeGeoB : planeGeoA;
            const charMaterial = new THREE.MeshBasicMaterial({
                map: createFallbackGlyphTexture(data.char, data.phonetic),
                transparent: true, side: THREE.DoubleSide,
                depthWrite: false, blending: THREE.AdditiveBlending
            });

            const plane = new THREE.Mesh(planeGeo, charMaterial);
            plane.position.copy(pos);
            plane.visible = false;
            spheresGroup.add(plane);
            data.planeMesh = plane;

            textureLoader.load(
                data.image,
                (loadedTex) => { loadedTex.colorSpace = THREE.SRGBColorSpace; charMaterial.map = loadedTex; charMaterial.needsUpdate = true; },
                undefined,
                () => {
                    const upperImage = data.image.replace('.png', '.PNG');
                    textureLoader.load(upperImage, (loadedTex) => {
                        loadedTex.colorSpace = THREE.SRGBColorSpace;
                        charMaterial.map = loadedTex; charMaterial.needsUpdate = true;
                    });
                }
            );
        });

        // =========================================================================
        // 8. Volumetric cone wall along the spiral
        // =========================================================================
        const wallGeometry = new THREE.BufferGeometry();
        const wallMesh = new THREE.Mesh(wallGeometry, wallMaterial);
        wallMesh.visible = false;
        spheresGroup.add(wallMesh);

        function rebuildWallGeometry() {
            const activeLANodes = activeSequence.slice(0, currentSeqIndex + 1).filter(node => node.id.startsWith('A'));
            if (activeLANodes.length < 2) {
                wallGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(), 3));
                wallGeometry.setIndex([]);
                return;
            }
            const maxT = Math.max(...activeLANodes.map(node => parseInt(node.id.substring(1)) - 1));
            const vertices = [], indices = [];
            const segmentsPerNode = 16;
            const totalSegments = Math.round(maxT * segmentsPerNode);

            for (let j = 1; j <= totalSegments; j++) {
                const tPrev = (j - 1) / segmentsPerNode;
                const tCurr = j / segmentsPerNode;
                const pPrev = getSpiralPosition(tPrev);
                const pCurr = getSpiralPosition(tCurr);

                let bPrevX, bPrevY, bPrevZ;
                if (tPrev >= 4) { const p = getSpiralPosition(tPrev - 4); bPrevX = p.x; bPrevY = p.y; bPrevZ = p.z; }
                else { bPrevX = pPrev.x; bPrevY = -0.4; bPrevZ = pPrev.z; } // Clamped bottom to first node Y level (-0.4) instead of -1.4

                let bCurrX, bCurrY, bCurrZ;
                if (tCurr >= 4) { const p = getSpiralPosition(tCurr - 4); bCurrX = p.x; bCurrY = p.y; bCurrZ = p.z; }
                else { bCurrX = pCurr.x; bCurrY = -0.4; bCurrZ = pCurr.z; } // Clamped bottom to first node Y level (-0.4) instead of -1.4

                const baseIndex = vertices.length / 3;
                vertices.push(
                    pPrev.x, pPrev.y, pPrev.z,
                    pCurr.x, pCurr.y, pCurr.z,
                    bPrevX, bPrevY, bPrevZ,
                    bCurrX, bCurrY, bCurrZ
                );
                indices.push(baseIndex + 0, baseIndex + 2, baseIndex + 1, baseIndex + 1, baseIndex + 2, baseIndex + 3);
            }

            wallGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(vertices), 3));
            wallGeometry.setIndex(indices);
            wallGeometry.computeVertexNormals();
            wallGeometry.attributes.position.needsUpdate = true;
            if (wallGeometry.index) wallGeometry.index.needsUpdate = true;
        }

        // =========================================================================
        // 9. Axial laser beams & axis labels
        // =========================================================================
        function createAxialLaserBeam(direction) {
            const beamGroup = new THREE.Group();
            const totalLength = 2.3, coneHeight = 0.15;
            const cylinderLength = totalLength - coneHeight;
            const cylinderRadius = 0.019, coneRadius = cylinderRadius * 2.2;
            const mat = new THREE.MeshBasicMaterial({
                color: 0x00d2ff, transparent: true, opacity: 0.8,
                blending: THREE.AdditiveBlending, side: THREE.DoubleSide
            });
            const shaft = new THREE.Mesh(new THREE.CylinderGeometry(cylinderRadius, cylinderRadius, cylinderLength, 16), mat);
            shaft.position.y = cylinderLength / 2; beamGroup.add(shaft);
            const head = new THREE.Mesh(new THREE.ConeGeometry(coneRadius, coneHeight, 16), mat);
            head.position.y = cylinderLength + (coneHeight / 2); beamGroup.add(head);
            beamGroup.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction);
            return beamGroup;
        }

        [
            new THREE.Vector3(1, 0, 0),  new THREE.Vector3(-1, 0, 0),
            new THREE.Vector3(0, 1, 0),  new THREE.Vector3(0, -1, 0),
            new THREE.Vector3(0, 0, 1),  new THREE.Vector3(0, 0, -1)
        ].forEach((dir) => spheresGroup.add(createAxialLaserBeam(dir)));

        function createAxisLabel(text, x, y, z) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 128, 128);
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffd700'; ctx.font = 'bold 36px sans-serif';
            ctx.shadowColor = '#ffaa00'; ctx.shadowBlur = 10;
            ctx.fillText(text, 64, 64);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true }));
            sprite.position.set(x, y, z);
            sprite.scale.set(0.6, 0.6, 1.0);
            scene.add(sprite);
        }
        createAxisLabel("+X", 3.2, 0, 0);  createAxisLabel("-X", -3.2, 0, 0);
        createAxisLabel("+Y", 0, 3.2, 0);  createAxisLabel("-Y", 0, -3.2, 0);
        createAxisLabel("+Z", 0, 0, 3.2);  createAxisLabel("-Z", 0, 0, -3.2);

        // =========================================================================
        // 10. Filter + sequencer
        // =========================================================================
        let activeSequence = [];
        let currentSeqIndex = -1;
        let seqTimer = 0;
        const nodeInterval = 2.5;
        let isRunning = false;

        // A node matches if the filter token is present OR its series name equals the filter.
        function nodeMatchesFilter(n, filterVal) {
            if (n.id.startsWith('A')) return false;
            const tokens = n.filter.split(',').map(f => f.trim());
            return tokens.includes(filterVal) || n.series === filterVal;
        }

        function generateAnimationSequence() {
            const filterVal = filterSelect.value;
            const includeGroupA = includeGroupACheckbox.checked;
            activeSequence = [];

            const laNodes = baseSphereData.filter(n => n.id.startsWith('A'));

            // Column of Light on its own -> just the spiral
            if (filterVal === 'Cột Trụ Quang Minh') {
                activeSequence = [...laNodes];
                return;
            }

            const otherNodes = baseSphereData
                .filter(n => nodeMatchesFilter(n, filterVal))
                .sort((a, b) => parseInt(a.id.substring(1)) - parseInt(b.id.substring(1)));

            if (includeGroupA) {
                for (let k = 0; k < 10; k++) {
                    for (let i = 0; i < 4; i++) {
                        const laNode = laNodes[k * 4 + i];
                        if (laNode) activeSequence.push(laNode);
                    }
                    otherNodes.forEach(node => activeSequence.push(node));
                }
            } else {
                activeSequence = [...otherNodes];
            }
        }

        function resetAnimation() {
            isRunning = false;
            currentSeqIndex = -1;
            seqTimer = 0;

            clickableSpheres.forEach((sphere) => {
                sphere.visible = false;
                sphere.userData.glow = 0.0;
                sphere.userData.hasBeenCalled = false;
                sphere.scale.setScalar(1.0);
                if (sphere.userData.id.startsWith('B')) {
                    sphere.material.color.copy(getBNodeBaseColor(sphere.userData.id));
                    sphere.material.emissive.setHex(0x000000);
                } else {
                    sphere.material.color.setHex(0xffffff);
                    sphere.material.emissive.setHex(0x000000);
                }
            });

            baseSphereData.forEach((data) => {
                if (data.planeMesh) {
                    data.planeMesh.visible = false;
                    data.planeMesh.scale.setScalar(1.0);
                }
            });

            wallMesh.visible = false;
            rebuildWallGeometry();
            hidePopup();
            startBtn.innerText = "Start Formation";
        }

        function triggerNextStep() {
            if (currentSeqIndex < activeSequence.length - 1) {
                currentSeqIndex++;
                const nodeData = activeSequence[currentSeqIndex];

                const isBGroup = nodeData.id.startsWith('B');
                const prevNodeData = currentSeqIndex > 0 ? activeSequence[currentSeqIndex - 1] : null;
                const transitionedToB = isBGroup && (!prevNodeData || prevNodeData.id.startsWith('A'));

                if (transitionedToB) {
                    clickableSpheres.forEach((sphere) => {
                        if (sphere.userData.id.startsWith('B')) {
                            sphere.visible = false;
                            sphere.userData.glow = 0.0;
                            sphere.userData.hasBeenCalled = false;
                            if (sphere.userData.planeMesh) sphere.userData.planeMesh.visible = false;
                            sphere.material.color.copy(getBNodeBaseColor(sphere.userData.id));
                            sphere.material.emissive.setHex(0x000000);
                        }
                    });
                }

                const sphere = nodeData.sphereMesh;
                const plane = nodeData.planeMesh;
                if (sphere && plane) {
                    sphere.visible = true;
                    plane.visible = true;
                    sphere.userData.glow = 2.0;
                    sphere.userData.hasBeenCalled = true;
                }

                rebuildWallGeometry();
            } else {
                if (!includeGroupACheckbox.checked) {
                    currentSeqIndex = -1;
                    clickableSpheres.forEach((sphere) => {
                        if (sphere.userData.id.startsWith('B')) sphere.userData.glow = 0.0;
                    });
                    triggerNextStep();
                } else {
                    isRunning = false;
                    startBtn.innerText = "Restart Formation";
                }
            }
        }

        // =========================================================================
        // 11. Click interactivity (raycasting)
        // =========================================================================
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let activeOutline = null;

        function showPopup(data) {
            popupName.innerText = `${data.name} (${data.id})`;
            popupChakra.innerText = data.chakra;
            popupGlyph.innerText = `${data.char} (${data.phonetic}) - Object: ${data.dharma}`;
            popupCoords.innerText = `X: ${data.excelPos[0].toFixed(2)}, Y: ${data.excelPos[1].toFixed(2)}, Z: ${data.excelPos[2].toFixed(2)}`;
            popupMantra.textContent = data.mantra;
            popupCard.classList.add('active');
        }

        function hidePopup() {
            popupCard.classList.remove('active');
            removeHighlight();
        }

        function highlightSphere(sphere) {
            removeHighlight();
            const outlineRadius = sphere.userData.id.startsWith('B') ? 0.12 : 0.16;
            const outlineGeo = new THREE.SphereGeometry(outlineRadius, 16, 16);
            const outlineMat = new THREE.MeshBasicMaterial({ color: 0x00d2ff, wireframe: true, transparent: true, opacity: 0.5 });
            activeOutline = new THREE.Mesh(outlineGeo, outlineMat);
            activeOutline.position.copy(sphere.position);
            spheresGroup.add(activeOutline);
        }

        function removeHighlight() {
            if (activeOutline) {
                spheresGroup.remove(activeOutline);
                activeOutline.geometry.dispose();   // dispose to avoid memory leaks
                activeOutline.material.dispose();
                activeOutline = null;
            }
        }

        document.getElementById('popup-close').addEventListener('click', (e) => {
            e.stopPropagation();
            hidePopup();
        });

        function handlePointerDown(event) {
            if (event.target.closest('#ui-container') || event.target.closest('#popup-card') || event.target.closest('#action-container')) return;
            const rect = renderer.domElement.getBoundingClientRect();
            const clientX = event.touches ? event.touches[0].clientX : event.clientX;
            const clientY = event.touches ? event.touches[0].clientY : event.clientY;
            mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const visibleSpheres = clickableSpheres.filter(s => s.visible);
            const intersects = raycaster.intersectObjects(visibleSpheres);
            if (intersects.length > 0) {
                const targetSphere = intersects[0].object;
                showPopup(targetSphere.userData);
                highlightSphere(targetSphere);
            } else {
                hidePopup();
            }
        }
        window.addEventListener('pointerdown', handlePointerDown);

        // =========================================================================
        // 12. UI bindings
        // =========================================================================
        startBtn.addEventListener('click', () => {
            if (isRunning) {
                resetAnimation();
            } else {
                resetAnimation();
                generateAnimationSequence();
                isRunning = true;
                wallMesh.visible = true;
                startBtn.innerText = "Reset / Restart";
                uiContainer.classList.add('collapsed');
                uiToggleBtn.innerText = '▼';
                triggerNextStep();
            }
        });

        filterSelect.addEventListener('change', resetAnimation);
        includeGroupACheckbox.addEventListener('change', resetAnimation);

        uiHeader.addEventListener('click', () => {
            const isCollapsed = uiContainer.classList.toggle('collapsed');
            uiToggleBtn.innerText = isCollapsed ? '▼' : '▲';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // =========================================================================
        // 13. Sequential glow updates
        // =========================================================================
        function updateSequentialLighting() {
            clickableSpheres.forEach((sphere) => {
                if (!sphere.visible) return;
                const nodeData = sphere.userData;
                const isLatest = activeSequence[currentSeqIndex] && activeSequence[currentSeqIndex].id === nodeData.id;
                const targetGlow = isLatest ? 2.0 : 0.6;
                sphere.userData.glow = THREE.MathUtils.lerp(sphere.userData.glow, targetGlow, 0.08);

                sphere.scale.setScalar(1.0 + (sphere.userData.glow * 0.25));

                const matchingBaseData = baseSphereData.find(d => d.id === nodeData.id);
                if (matchingBaseData && matchingBaseData.planeMesh) {
                    matchingBaseData.planeMesh.scale.setScalar(1.0 + (sphere.userData.glow * 0.15));
                }

                if (nodeData.id.startsWith('B')) {
                    const baseColor = getBNodeBaseColor(nodeData.id);
                    const targetColor = isLatest ? new THREE.Color(0xff3333) : baseColor;
                    const targetEmissive = isLatest ? new THREE.Color(0xff0000) : baseColor.clone().multiplyScalar(0.5);

                    sphere.material.color.lerp(targetColor, 0.08);
                    sphere.material.emissive.lerp(targetEmissive, 0.08);
                    sphere.material.emissiveIntensity = sphere.userData.glow * 2.5;
                    sphere.material.roughness = 0.05 + (sphere.userData.glow * 0.3);
                } else {
                    sphere.material.color.lerpColors(new THREE.Color(0xffffff), new THREE.Color(0xffd700), sphere.userData.glow);
                    sphere.material.emissive.lerpColors(new THREE.Color(0x000000), new THREE.Color(0xffaa00), sphere.userData.glow);
                    sphere.material.emissiveIntensity = sphere.userData.glow * 2.5;
                    sphere.material.roughness = 0.05 + (sphere.userData.glow * 0.3);
                }
            });
        }

        // =========================================================================
        // 14. Animation loop
        // =========================================================================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const elapsedTime = clock.getElapsedTime();

            const glowVal = parseFloat(glowIntensityInput.value);
            coreLight.intensity = (Math.sin(elapsedTime * 2) * 0.4 + 1.2) * glowVal;
            coreLight.position.y = Math.sin(elapsedTime * 0.6) * 0.5;

            if (isRunning) {
                seqTimer += delta;
                if (seqTimer >= nodeInterval) {
                    seqTimer = 0;
                    triggerNextStep();
                }
                wallMaterial.opacity = (0.35 + Math.sin(elapsedTime * 3.0) * 0.1) * glowVal;
            }

            const rpm = parseFloat(rotationSpeedInput.value);
            const rotationStep = ((rpm * Math.PI * 2) / 60) * delta;
            spheresGroup.rotation.y += rotationStep;
            buddhaGroup.rotation.y += rotationStep;

            updateSequentialLighting();

            // Glyph plane float + billboard (Y-up is excelPos[1])
            baseSphereData.forEach((data) => {
                const plane = data.planeMesh;
                if (plane && plane.visible) {
                    const floatOffset = Math.sin(elapsedTime * 1.5 + data.excelPos[0] * 2) * 0.012;
                    plane.position.y = data.excelPos[1] + floatOffset;
                    if (billboardModeSelect.value === 'billboard') {
                        plane.quaternion.copy(camera.quaternion);
                    } else {
                        plane.rotation.set(0, elapsedTime * 0.5, 0);
                    }
                }
            });

            controls.update();
            renderer.render(scene, camera);
        }

        generateAnimationSequence();
        animate();
    </script>
</body>
</html>
